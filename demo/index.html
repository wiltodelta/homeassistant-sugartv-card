<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>SugarTV Card demo</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap"
            rel="stylesheet"
        />
        <style>
            body {
                background: #fafafa;
                font-family: 'Roboto', sans-serif;
                margin: 0;
                padding: 20px;
                color: #333;
            }
            .container {
                max-width: 1600px;
                margin: 0 auto;
            }
            .controls {
                background: #e3f2fd;
                padding: 15px;
                border-radius: 8px;
                margin: 0 0 20px 0;
                text-align: center;
            }
            .controls label {
                margin: 0 10px 0 20px;
                font-weight: bold;
            }
            .demo-grid {
                display: grid;
                gap: 32px;
            }
            .demo-card {
                background: white;
                border-radius: 16px;
                padding: 24px;
                box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            }
            sugartv-card {
                display: block;
            }
            /*
             * The two shapes a dashboard actually hands the card. The card has
             * no layout setting: it reads the box and picks the orientation, so
             * these are container sizes, not card options.
             */
            .demo-grid.horizontal {
                grid-template-columns: repeat(auto-fill, minmax(560px, 1fr));
            }
            .demo-grid.horizontal sugartv-card {
                width: 100%;
                height: 200px;
            }
            .demo-grid.vertical {
                grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            }
            .demo-grid.vertical sugartv-card {
                width: 240px;
                height: 360px;
                margin: 0 auto;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <div class="controls">
                <label for="locale-select">HA language:</label>
                <!--
                  Filled from test/ha-languages.json so the demo offers exactly
                  the languages Home Assistant does, and cannot drift from what
                  the tests cover.
                -->
                <select id="locale-select">
                    <option value="en">English (en)</option>
                </select>
                <label for="unit-select">Unit:</label>
                <select id="unit-select">
                    <option value="mg/dL">mg/dL</option>
                    <option value="mmol/L">mmol/L</option>
                </select>
                <label for="layout-select">Layout:</label>
                <select id="layout-select">
                    <option value="horizontal">Horizontal (wide slot)</option>
                    <option value="vertical">Vertical (tall slot)</option>
                </select>
                <label for="prediction-toggle">Show Prediction:</label>
                <input type="checkbox" id="prediction-toggle" checked />
                <label for="relative-toggle">Relative Time:</label>
                <input type="checkbox" id="relative-toggle" />
                <label for="dim-toggle">Dim by age:</label>
                <input type="checkbox" id="dim-toggle" />
                <!--
                  The age fade is a function of how old the reading is, so the
                  demo needs a way to age one. Every card renders at "now"
                  otherwise, which is the one rung that draws nothing.
                -->
                <label for="age-select">Reading age:</label>
                <select id="age-select">
                    <option value="0">Now</option>
                    <option value="7">7 min (a poll missed)</option>
                    <option value="20">20 min (stale)</option>
                </select>
                <label for="zones-toggle">Color zones:</label>
                <input type="checkbox" id="zones-toggle" checked />
                <!--
                  The thresholds themselves. Their defaults differ per unit, so
                  switching the unit refills these rather than carrying mg/dL
                  numbers onto a mmol card -- which is the exact bug that made a
                  normal 8.1 read as urgent low.
                -->
                <label for="th-urgent-low">Thresholds:</label>
                <input
                    type="number"
                    id="th-urgent-low"
                    step="0.1"
                    title="Urgent low"
                />
                <input type="number" id="th-low" step="0.1" title="Low" />
                <input type="number" id="th-high" step="0.1" title="High" />
                <input
                    type="number"
                    id="th-urgent-high"
                    step="0.1"
                    title="Urgent high"
                />
                <!--
                  The two Home Assistant profile settings the card inherits.
                  "Auto" is how Home Assistant ships them, and means the
                  language decides.
                -->
                <label for="time-format-select">HA time format:</label>
                <select id="time-format-select">
                    <option value="">Auto (from language)</option>
                    <option value="12">12 hour</option>
                    <option value="24">24 hour</option>
                </select>
                <label for="number-format-select">HA number format:</label>
                <select id="number-format-select">
                    <option value="">Auto (from language)</option>
                    <option value="comma_decimal">1,234.56</option>
                    <option value="decimal_comma">1.234,56</option>
                    <option value="space_comma">1 234,56</option>
                    <option value="quote_decimal">1'234.56</option>
                    <option value="none">No formatting</option>
                </select>
            </div>
            <div class="demo-grid horizontal" id="card-grid">
                <!-- All cards will be dynamically injected here -->
            </div>
        </div>

        <script type="module" src="/demo/hass-mock.js"></script>
        <script type="module" src="/dist/sugartv-card.js"></script>
        <script>
            // --- Helper Functions ---
            /*
             * Home Assistant hands a card its own `locale` block, separate from
             * the language: Time format and Number format are per-user profile
             * settings. The card inherits both, so the mock has to supply them
             * or the demo cannot show that behaviour at all.
             */
            function haLocale() {
                const language =
                    document.getElementById('locale-select').value || 'en';
                const time_format =
                    document.getElementById('time-format-select').value;
                const number_format = document.getElementById(
                    'number-format-select',
                ).value;
                return {
                    language,
                    // Omitted rather than empty: Home Assistant sends
                    // 'language' for auto, and the card treats absent the same.
                    ...(time_format ? { time_format } : {}),
                    ...(number_format ? { number_format } : {}),
                };
            }

            function createHass(value, trend, unit, date, prev) {
                const curSec = Math.floor(date.getTime() / 1000);
                const locale = haLocale();
                return {
                    language: locale.language,
                    locale,
                    states: {
                        'sensor.dexcom_glucose_value': {
                            state: String(value),
                            attributes: { unit_of_measurement: unit },
                            last_changed: date.toISOString(),
                        },
                        'sensor.dexcom_glucose_trend': { state: trend },
                    },
                    // The card reads the previous reading from the history
                    // WebSocket API, so the mock has to answer callWS or the
                    // delta never resolves and shows the waiting clock.
                    callWS: async ({ entity_ids }) => ({
                        [entity_ids[0]]: [
                            {
                                s: String(prev === undefined ? value : prev),
                                lu: curSec - 300,
                            },
                            { s: String(value), lu: curSec },
                        ],
                    }),
                };
            }
            /*
             * The threshold inputs. Defaults come from the card itself rather
             * than being retyped here, so the demo cannot drift from what a
             * real install gets, and they refill when the unit changes: mg/dL
             * numbers on a mmol card are what once made a normal 8.1 read as
             * urgent low.
             */
            const THRESHOLD_IDS = {
                urgent_low: 'th-urgent-low',
                low: 'th-low',
                high: 'th-high',
                urgent_high: 'th-urgent-high',
            };

            function defaultThresholds(unit) {
                const card = customElements.get('sugartv-card');
                return card.DEFAULT_THRESHOLDS[unit];
            }

            function fillThresholds(unit) {
                const defaults = defaultThresholds(unit);
                for (const [key, id] of Object.entries(THRESHOLD_IDS)) {
                    document.getElementById(id).value = defaults[key];
                }
            }

            function readThresholds() {
                const out = {};
                for (const [key, id] of Object.entries(THRESHOLD_IDS)) {
                    out[key] = Number(document.getElementById(id).value);
                }
                return out;
            }

            // A reading five minutes earlier, so scenarios show a real delta.
            function previousOf(value, unit) {
                const n = parseFloat(value);
                if (isNaN(n)) return value; // unavailable stays unavailable
                return unit === 'mg/dL' ? n - 5 : (n - 0.3).toFixed(1);
            }

            // Lovelace order: setConfig runs before hass is assigned. Keep it
            // that way here so the demo exercises the path a dashboard takes.
            function setupCard(card, config, hass) {
                if (!card) return;
                card.setConfig(config);
                card.hass = hass;
            }
            function setupCardWithDelta(
                card,
                config,
                { val1, val2, trend, unit, ageMinutes = 0 },
            ) {
                if (!card) return;
                /*
                 * Backdated by ageMinutes. createHass derives the history from
                 * the same date, so the cadence the card measures stays five
                 * minutes however old the reading is -- otherwise ageing a
                 * reading would move the thresholds it is being judged against.
                 */
                const date = new Date(Date.now() - ageMinutes * 60 * 1000);
                setupCard(
                    card,
                    config,
                    createHass(val2, trend, unit, date, val1),
                );
            }

            // --- Main Render Function ---
            function renderAllCards() {
                const grid = document.getElementById('card-grid');
                grid.innerHTML = ''; // Clear existing cards

                const selectedUnit =
                    document.getElementById('unit-select').value;
                const showPrediction =
                    document.getElementById('prediction-toggle').checked;
                const relativeTime =
                    document.getElementById('relative-toggle').checked;
                const dimByAge = document.getElementById('dim-toggle').checked;
                const colorThresholds =
                    document.getElementById('zones-toggle').checked;
                const ageMinutes = Number(
                    document.getElementById('age-select').value,
                );

                /*
                 * No `locale` here on purpose. The picker sets Home Assistant's
                 * language instead, so the demo exercises the path almost every
                 * real install is on: the card inheriting its language and
                 * formats rather than being told them per card.
                 */
                const config = {
                    glucose_value: 'sensor.dexcom_glucose_value',
                    glucose_trend: 'sensor.dexcom_glucose_trend',
                    show_prediction: showPrediction,
                    relative_time: relativeTime,
                    dim_by_age: dimByAge,
                    color_thresholds: colorThresholds,
                    thresholds: readThresholds(),
                };

                const scenarios = [
                    {
                        id: 'rising_quickly',
                        title: 'rising quickly',
                        type: 'static',
                        trend: 'rising_quickly',
                    },
                    {
                        id: 'rising',
                        title: 'rising',
                        type: 'static',
                        trend: 'rising',
                    },
                    {
                        id: 'rising_slightly',
                        title: 'rising slightly (Delta: 0)',
                        type: 'delta',
                        trend: 'rising_slightly',
                        params: { val1: 120, val2: 120 },
                    },
                    {
                        id: 'steady',
                        title: 'steady (Delta: +)',
                        type: 'delta',
                        trend: 'steady',
                        params: { val1: 110, val2: 120 },
                    },
                    {
                        id: 'falling_slightly',
                        title: 'falling slightly (Delta: -)',
                        type: 'delta',
                        trend: 'falling_slightly',
                        params: { val1: 130, val2: 120 },
                    },
                    {
                        id: 'falling',
                        title: 'falling',
                        type: 'static',
                        trend: 'falling',
                    },
                    {
                        id: 'falling_quickly',
                        title: 'falling quickly',
                        type: 'static',
                        trend: 'falling_quickly',
                    },
                    {
                        id: 'unknown',
                        title: 'unknown',
                        type: 'static',
                        trend: 'unknown',
                    },
                    {
                        id: 'unavailable-value',
                        title: 'UNAVAILABLE: Value',
                        type: 'static',
                        trend: 'steady',
                        valueOverride: 'unavailable',
                    },
                    {
                        id: 'unavailable-trend',
                        title: 'UNAVAILABLE: Trend',
                        type: 'static',
                        trend: 'unavailable',
                    },
                    {
                        id: 'zone-urgent-low',
                        title: 'ZONE: Urgent Low (40)',
                        type: 'static',
                        trend: 'falling_quickly',
                        valueOverride: 40,
                    },
                    {
                        id: 'zone-low',
                        title: 'ZONE: Low (60)',
                        type: 'static',
                        trend: 'falling',
                        valueOverride: 60,
                    },
                    {
                        id: 'zone-high',
                        title: 'ZONE: High (200)',
                        type: 'static',
                        trend: 'rising',
                        valueOverride: 200,
                    },
                    {
                        id: 'zone-urgent-high',
                        title: 'ZONE: Urgent High (300)',
                        type: 'static',
                        trend: 'rising_quickly',
                        valueOverride: 300,
                    },
                    {
                        id: 'stale',
                        title: 'STALE: Normal (20 min ago)',
                        type: 'stale',
                        trend: 'steady',
                    },
                    {
                        id: 'stale-urgent-low',
                        title: 'STALE: Urgent Low (20 min ago)',
                        type: 'stale',
                        trend: 'falling_quickly',
                        valueOverride: 40,
                    },
                    {
                        id: 'stale-low',
                        title: 'STALE: Low (20 min ago)',
                        type: 'stale',
                        trend: 'falling',
                        valueOverride: 60,
                    },
                    {
                        id: 'stale-high',
                        title: 'STALE: High (20 min ago)',
                        type: 'stale',
                        trend: 'rising',
                        valueOverride: 200,
                    },
                    {
                        id: 'stale-urgent-high',
                        title: 'STALE: Urgent High (20 min ago)',
                        type: 'stale',
                        trend: 'rising_quickly',
                        valueOverride: 300,
                    },
                ];

                scenarios.forEach((scenario, index) => {
                    const cardId = `card-${scenario.id}`;
                    const cardWrapper = document.createElement('div');
                    cardWrapper.className = 'demo-card';
                    cardWrapper.innerHTML = `<sugartv-card id="${cardId}"></sugartv-card>`;
                    grid.appendChild(cardWrapper);
                    const cardElement = document.getElementById(cardId);

                    let baseValue;
                    if (scenario.trend.startsWith('falling')) baseValue = 45;
                    else if (scenario.trend.startsWith('rising'))
                        baseValue = 205;
                    else baseValue = 120;

                    if (scenario.type === 'delta') {
                        const p = scenario.params;
                        const v1 =
                            selectedUnit === 'mg/dL'
                                ? p.val1
                                : (p.val1 / 18).toFixed(1);
                        const v2 =
                            selectedUnit === 'mg/dL'
                                ? p.val2
                                : (p.val2 / 18).toFixed(1);
                        setupCardWithDelta(cardElement, config, {
                            val1: v1,
                            val2: v2,
                            trend: scenario.trend,
                            unit: selectedUnit,
                            ageMinutes,
                        });
                    } else if (scenario.type === 'stale') {
                        let value =
                            scenario.valueOverride !== undefined
                                ? scenario.valueOverride
                                : baseValue;
                        if (
                            selectedUnit === 'mmol/L' &&
                            !isNaN(parseFloat(value))
                        ) {
                            value = (parseFloat(value) / 18).toFixed(1);
                        }
                        const staleDate = new Date(Date.now() - 20 * 60 * 1000);
                        setupCard(
                            cardElement,
                            config,
                            createHass(
                                value,
                                scenario.trend,
                                selectedUnit,
                                staleDate,
                                previousOf(value, selectedUnit),
                            ),
                        );
                    } else {
                        // static
                        let value =
                            scenario.valueOverride !== undefined
                                ? scenario.valueOverride
                                : baseValue;
                        if (
                            selectedUnit === 'mmol/L' &&
                            !isNaN(parseFloat(value))
                        ) {
                            value = (parseFloat(value) / 18).toFixed(1);
                        }
                        /*
                         * Stagger the reading times across the gallery. With
                         * every card reading "now" the relative-time mode has
                         * nothing to show, and a real dashboard never has two
                         * sensors in lockstep anyway. Stays well under the
                         * staleness threshold so the zone colours still read.
                         */
                        /*
                         * The picker wins when it is set, so every card lands
                         * on the same rung and the fade is comparable across
                         * the gallery. At "now" the stagger is back.
                         */
                        const minutesOld = ageMinutes || index % 8;
                        setupCard(
                            cardElement,
                            config,
                            createHass(
                                value,
                                scenario.trend,
                                selectedUnit,
                                new Date(Date.now() - minutesOld * 60 * 1000),
                                previousOf(value, selectedUnit),
                            ),
                        );
                    }
                });
            }

            /*
             * The same list the tests use, so the demo can never offer fewer
             * languages than the card claims to support. Intl names each one in
             * itself, which is how a language picker should read.
             */
            async function fillLocales() {
                const select = document.getElementById('locale-select');
                const codes = await fetch('/test/ha-languages.json').then((r) =>
                    r.json(),
                );
                for (const code of codes) {
                    if (code === 'en') continue; // already the seed option
                    const option = document.createElement('option');
                    option.value = code;
                    let name = code;
                    try {
                        name =
                            new Intl.DisplayNames([code], {
                                type: 'language',
                            }).of(code) || code;
                    } catch (e) {
                        // Intl has no name for it; the code alone will do.
                    }
                    option.textContent = `${name} (${code})`;
                    select.appendChild(option);
                }
            }

            // --- Initial Setup ---
            customElements.whenDefined('sugartv-card').then(async () => {
                await fillLocales();
                /*
                 * The unit refills the thresholds before re-rendering, since
                 * their defaults are per unit. Registered as one handler rather
                 * than two so the order cannot drift.
                 */
                document
                    .getElementById('unit-select')
                    .addEventListener('change', (e) => {
                        fillThresholds(e.target.value);
                        renderAllCards();
                    });
                document
                    .getElementById('zones-toggle')
                    .addEventListener('change', renderAllCards);
                for (const id of Object.values(THRESHOLD_IDS)) {
                    document
                        .getElementById(id)
                        .addEventListener('change', renderAllCards);
                }
                document
                    .getElementById('prediction-toggle')
                    .addEventListener('change', renderAllCards);
                document
                    .getElementById('relative-toggle')
                    .addEventListener('change', renderAllCards);
                document
                    .getElementById('dim-toggle')
                    .addEventListener('change', renderAllCards);
                document
                    .getElementById('age-select')
                    .addEventListener('change', renderAllCards);
                document
                    .getElementById('time-format-select')
                    .addEventListener('change', renderAllCards);
                document
                    .getElementById('number-format-select')
                    .addEventListener('change', renderAllCards);
                document
                    .getElementById('locale-select')
                    .addEventListener('change', renderAllCards);
                document
                    .getElementById('layout-select')
                    .addEventListener('change', applyLayout);
                applyLayout();
                fillThresholds(document.getElementById('unit-select').value);
                renderAllCards();
            });

            // Only the container's shape changes; the card decides the rest.
            function applyLayout() {
                const mode = document.getElementById('layout-select').value;
                const grid = document.getElementById('card-grid');
                grid.classList.toggle('horizontal', mode === 'horizontal');
                grid.classList.toggle('vertical', mode === 'vertical');
            }
        </script>
    </body>
</html>
