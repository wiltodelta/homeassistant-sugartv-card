<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>SugarTV Card layout shot</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap"
            rel="stylesheet"
        />
        <style>
            html,
            body {
                margin: 0;
                padding: 0;
                background: #f2f4f7;
                font-family: 'Roboto', system-ui, sans-serif;
            }
            .stage {
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 48px;
                padding: 48px;
                box-sizing: border-box;
                /*
                 * Wraps so a set too wide for one line becomes a grid rather
                 * than a strip nobody can read at README width. The window
                 * decides where it breaks, so the shoot command controls the
                 * shape of the figure.
                 */
                flex-wrap: wrap;
            }
            /*
             * A figure is the card plus its caption. The age tiers differ only
             * in opacity, so without a caption the reader cannot tell which
             * rung a card is on, or that the difference is the point.
             */
            .figure {
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 14px;
            }
            .caption {
                font-size: 15px;
                line-height: 1.35;
                color: #5f6368;
                text-align: center;
                max-width: 24ch;
            }
            .caption b {
                color: #212121;
                font-weight: 500;
            }
            /* Mimic how HA frames a card on a dashboard. */
            .ha-card {
                background: #fff;
                border-radius: 12px;
                box-shadow:
                    0 2px 2px rgba(0, 0, 0, 0.07),
                    0 1px 5px rgba(0, 0, 0, 0.06);
                overflow: hidden;
                /*
                 * The text colour belongs here, not on the card. A rule in this
                 * document outranks the card's own :host() rules, so colouring
                 * sugartv-card directly would defeat the zone colours and shoot
                 * black text on the red urgent background.
                 */
                color: #212121;
            }
            sugartv-card {
                display: block;
                width: 100%;
                height: 100%;
            }
        </style>
    </head>
    <body>
        <div class="stage" id="stage"></div>

        <script type="module" src="/demo/hass-mock.js"></script>
        <script type="module" src="/dist/sugartv-card.js"></script>
        <script>
            const params = new URLSearchParams(location.search);
            /*
             * One spec a card, comma separated:
             *
             *     WIDTHxHEIGHT:VALUE:TREND[:opt=value;opt=value]
             *
             * The shape decides the layout the card picks, the value decides
             * the colour zone, so a single page shoots both kinds of figure.
             *
             * The options field is semicolon separated, since the comma already
             * separates cards. It exists because the age tiers cannot be shot
             * without it: they are a function of how old the reading is, and
             * every card here used to be pinned to `now`.
             *
             *   age    minutes to backdate the reading by (default 0, "now")
             *   rel    1 to show the age in place of the clock (relative_time)
             *   dim    1 to enable dim_by_age
             *   pred   0 to drop the forecast line
             *   loc    the card's locale (default en-US)
             *   label  caption under the card; <b> is allowed
             */
            const specs = (
                params.get('specs') || '560x200:145:rising,260x300:145:rising'
            )
                .split(',')
                .map((spec) => {
                    const [shape, value, trend, options] = spec.split(':');
                    const [w, h] = shape.split('x').map(Number);
                    const opt = Object.fromEntries(
                        (options || '')
                            .split(';')
                            .filter(Boolean)
                            .map((pair) => pair.split('=')),
                    );
                    return {
                        w,
                        h,
                        value,
                        trend: trend || 'steady',
                        age: Number(opt.age || 0),
                        relative: opt.rel === '1',
                        dim: opt.dim === '1',
                        prediction: opt.pred !== '0',
                        locale: opt.loc || 'en-US',
                        label: opt.label ? decodeURIComponent(opt.label) : '',
                    };
                });
            const UNIT = params.get('unit') || 'mg/dL';
            const STEP = Number(params.get('step') ?? 5);

            /*
             * Take the delta's direction from the trend so the arrow and the
             * number agree. A card showing a rising arrow next to a negative
             * delta reads as a bug in the card rather than a staged figure.
             */
            function hass(value, trend, date) {
                const id = 'sensor.jane_glucose_value';
                const sec = Math.floor(date.getTime() / 1000);
                const direction = trend.startsWith('falling')
                    ? 1
                    : trend.startsWith('rising')
                      ? -1
                      : 0;
                const previous = (Number(value) + direction * STEP).toFixed(
                    UNIT === 'mmol/L' ? 1 : 0,
                );
                return {
                    states: {
                        [id]: {
                            state: String(value),
                            attributes: { unit_of_measurement: UNIT },
                            last_changed: date.toISOString(),
                        },
                        'sensor.jane_glucose_trend': { state: trend },
                    },
                    callWS: async ({ entity_ids }) => ({
                        [entity_ids[0]]: [
                            { s: previous, lu: sec - 300 },
                            { s: String(value), lu: sec },
                        ],
                    }),
                };
            }

            customElements.whenDefined('sugartv-card').then(() => {
                const stage = document.getElementById('stage');
                specs.forEach((spec) => {
                    const figure = document.createElement('div');
                    figure.className = 'figure';
                    stage.appendChild(figure);

                    const frame = document.createElement('div');
                    frame.className = 'ha-card';
                    frame.style.width = spec.w + 'px';
                    frame.style.height = spec.h + 'px';
                    figure.appendChild(frame);

                    const card = document.createElement('sugartv-card');
                    frame.appendChild(card);
                    card.setConfig({
                        glucose_value: 'sensor.jane_glucose_value',
                        glucose_trend: 'sensor.jane_glucose_trend',
                        show_prediction: spec.prediction,
                        relative_time: spec.relative,
                        dim_by_age: spec.dim,
                        locale: spec.locale,
                    });
                    /*
                     * Backdated by `age`, which defaults to now. The history
                     * the mock returns is backdated with it, so the measured
                     * cadence stays 5 minutes however old the reading is —
                     * otherwise the age tiers would be shot against a cadence
                     * that moved underneath them.
                     */
                    const date = new Date(Date.now() - spec.age * 60 * 1000);
                    card.hass = hass(spec.value, spec.trend, date);

                    if (spec.label) {
                        const caption = document.createElement('div');
                        caption.className = 'caption';
                        caption.innerHTML = spec.label;
                        figure.appendChild(caption);
                    }
                });
                // Signal readiness for the headless capture.
                Promise.all([
                    document.fonts.ready,
                    new Promise((r) => setTimeout(r, 600)),
                ]).then(() => {
                    document.title = 'READY';
                    document.body.dataset.ready = '1';
                });
            });
        </script>
    </body>
</html>
